apiVersion: launchgate.dev/v1alpha1
kind: SLOPolicy
metadata:
  name: grocery-overrides
  project: grocery
spec:
  defaults:
    hard:
      operator: "<="
      value: 800
    soft:
      operator: "<="
      value: 500
  rules:
    - name: smoke-latency
      metric: http_req_duration_p95
      selector:
        scenario: smoke
      thresholds:
        hard:
          operator: "<="
          value: 750
        soft:
          operator: "<="
          value: 450
