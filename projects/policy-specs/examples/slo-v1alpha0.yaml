apiVersion: launchgate.dev/v1alpha0
kind: SLOPolicy
metadata:
  name: legacy-policy
spec:
  defaultThreshold:
    operator: "<="
    value: 1200
  rules:
    - name: smoke-latency
      metric: http_req_duration_p95
      selector:
        scenario: smoke
      threshold:
        operator: "<="
        value: 1000
