name: K6 Performance Testing

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Type of test to run'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike
      target_url:
        description: 'Target URL for testing'
        required: false
        default: 'https://example.com'

jobs:
  k6-smoke-test:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'smoke' || github.event.inputs.test_type == ''
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install k6
      run: |
        sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run smoke tests
      run: |
        k6 run --out csv=results_smoke.csv grocery_load_test.js
        k6 run --out csv=results_grocery.csv grocery_rate_test.js
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: k6-smoke-results
        path: results_*.csv

  k6-load-test:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'load'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install k6
      run: |
        sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run load tests
      run: |
        k6 run --out csv=results_load.csv kravemart_test.js
        k6 run --out csv=results_param.csv kravemart_parameterized.js
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: k6-load-results
        path: results_*.csv

  k6-stress-test:
    runs-on: ubuntu-latest
    if: github.event.inputs.test_type == 'stress'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install k6
      run: |
        sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run stress tests
      run: |
        K6_STRESS_TEST=true k6 run --out csv=results_stress.csv k6-scenario.js
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      with:
        name: k6-stress-results
        path: results_*.csv

  generate-report:
    needs: [k6-smoke-test, k6-load-test, k6-stress-test]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      
    - name: Setup Node.js for report generation
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Generate HTML report
      run: |
        npm install -g k6-html-reporter
        node generate-report.js
        
    - name: Upload HTML report
      uses: actions/upload-artifact@v3
      with:
        name: k6-html-report
        path: report.html
        
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '📊 K6 Performance tests completed! Check the artifacts for detailed results.'
          })